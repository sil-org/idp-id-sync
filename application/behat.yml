default:
    suites:
        google_sheets_integration_features:
            paths:    [ "%paths.base%/_tests/_features/id-store-integration.feature" ]
            contexts: [ Sil\Idp\IdSync\_tests\bootstrap\GoogleSheetsIntegrationContext ]
        idp_id_broker_integration_features:
            paths:    [ "%paths.base%/_tests/_features/idp-id-broker-integration.feature" ]
            contexts: [ Sil\Idp\IdSync\_tests\bootstrap\IdpIdBrokerIntegrationContext ]
        safety_cutoff_features:
            paths:    [ "%paths.base%/_tests/_features/safetyCutoff.feature" ]
            contexts: [ Sil\Idp\IdSync\_tests\bootstrap\SafetyCutoffContext ]
        sync_features:
            paths:    [ "%paths.base%/_tests/_features/sync.feature" ]
            contexts: [ Sil\Idp\IdSync\_tests\bootstrap\SyncContext ]
        user_features:
            paths:    [ "%paths.base%/_tests/_features/user.feature" ]
            contexts: [ Sil\Idp\IdSync\_tests\bootstrap\UserContext ]
        workday_integration_features:
            filters:
                # removing whitespace to silence faulty deprecation warning
                # see https://github.com/Behat/Gherkin/pull/215#issuecomment-944115733
                tags: '~@specificUser&&~@usersChangedSince&&~@canUpdateLastSynced'
            paths:    [ "%paths.base%/_tests/_features/id-store-integration.feature" ]
            contexts: [ Sil\Idp\IdSync\_tests\bootstrap\WorkdayIntegrationContext ]
        secure_user_integration_features:
            filters:
                # removing whitespace to silence faulty deprecation warning
                # see https://github.com/Behat/Gherkin/pull/215#issuecomment-944115733
                tags: '~@usersChangedSince&&~@canUpdateLastSynced'
            paths:    [ "%paths.base%/_tests/_features/id-store-integration.feature" ]
            contexts: [ Sil\Idp\IdSync\_tests\bootstrap\SecureUserIntegrationContext ]
        notification_features:
            paths:    [ "%paths.base%/_tests/_features/notification.feature" ]
            contexts: [ Sil\Idp\IdSync\_tests\bootstrap\NotificationContext ]
